services:
  sensos-controller:
    build:
      context: ./controller
      args:
        VERSION_MAJOR: ${VERSION_MAJOR}
        VERSION_MINOR: ${VERSION_MINOR}
        VERSION_PATCH: ${VERSION_PATCH}
        VERSION_SUFFIX: ${VERSION_SUFFIX}
        GIT_COMMIT: ${GIT_COMMIT}
        GIT_BRANCH: ${GIT_BRANCH}
        GIT_TAG: ${GIT_TAG}
        GIT_DIRTY: ${GIT_DIRTY}
    container_name: sensos-controller
    restart: always
    depends_on:
      sensos-database:
        condition: service_healthy
    env_file: .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      VERSION_MAJOR: ${VERSION_MAJOR}
      VERSION_MINOR: ${VERSION_MINOR}
      VERSION_PATCH: ${VERSION_PATCH}
      VERSION_SUFFIX: ${VERSION_SUFFIX}
      GIT_COMMIT: ${GIT_COMMIT}
      GIT_BRANCH: ${GIT_BRANCH}
      GIT_TAG: ${GIT_TAG}
      GIT_DIRTY: ${GIT_DIRTY}
      EXPOSE_CONTAINERS: ${EXPOSE_CONTAINERS}
    expose:
      - "8765"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/healthz"]
      interval: 5s
      retries: 12
      start_period: 5s
    networks:
      - sensos_network

  sensos-wireguard:
    build: ./wireguard
    container_name: sensos-wireguard
    restart: unless-stopped
    depends_on:
      sensos-controller:
        condition: service_healthy
      sensos-database:
        condition: service_healthy
    env_file: .env
    cap_add:
      - NET_ADMIN
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sensos_wireguard_state:/var/lib/sensos-wireguard
    ports:
      - "51281:51281/udp"
      - "51282:51282/udp"
      - "51283:51283/udp"
      - "51284:51284/udp"
      - "51285:51285/udp"
      - "51286:51286/udp"
      - "51287:51287/udp"
      - "51288:51288/udp"
      - "51289:51289/udp"
    healthcheck:
      test: ["CMD", "wg", "show"]
      interval: 10s
      retries: 5
      start_period: 10s
    networks:
      - sensos_network

  sensos-database:
    build: ./database
    container_name: sensos-database
    restart: always
    env_file: .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sensos_database:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - sensos_network

  sensos-api-proxy:
    build:
      context: ./api-proxy
    container_name: sensos-api-proxy
    depends_on:
      sensos-controller:
        condition: service_healthy
      sensos-database:
        condition: service_healthy
    restart: always
    env_file: .env
    volumes:
      - sensos_api_proxy_state:/var/lib/sensos-api-proxy
    cap_add:
      - NET_ADMIN
    ports:
      - "${API_PORT:-8765}:8765"
    networks:
      - sensos_network

  sensos-ops:
    build:
      context: ./ops
    container_name: sensos-ops
    depends_on:
      sensos-controller:
        condition: service_healthy
      sensos-database:
        condition: service_healthy
      sensos-wireguard:
        condition: service_healthy
    restart: always
    env_file: .env
    cap_add:
      - NET_ADMIN
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sensos_ops_state:/var/lib/sensos-ops
    networks:
      - sensos_network

volumes:
  sensos_database:
    name: sensos_database
  sensos_wireguard_state:
    name: sensos_wireguard_state
  sensos_api_proxy_state:
    name: sensos_api_proxy_state
  sensos_ops_state:
    name: sensos_ops_state

networks:
  sensos_network:
    driver: bridge
